name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish
        run: npm publish --access public --provenance

      - name: Purge jsDelivr cache
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          curl -fsSL "https://purge.jsdelivr.net/npm/@wavoip/wavoip-api@${PKG_VERSION}" || true
          curl -fsSL "https://purge.jsdelivr.net/npm/@wavoip/wavoip-api@latest" || true
          curl -fsSL "https://purge.jsdelivr.net/npm/@wavoip/wavoip-api" || true
